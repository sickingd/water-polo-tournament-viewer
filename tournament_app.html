<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Water Polo Tournament</title>
<style>
:root {
  --blue: #1a56a8;
  --blue-light: #e8f0fb;
  --green: #15803d;
  --green-light: #dcfce7;
  --red: #b91c1c;
  --red-light: #fee2e2;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --border: #e5e7eb;
  --text: #111827;
  --text-2: #6b7280;
  --gold: #d97706;
  --gold-light: #fef3c7;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: var(--text); min-height: 100vh; }
.safe-top { height: env(safe-area-inset-top, 0); background: var(--blue); }

/* HEADER */
.header { background: var(--blue); color: white; padding: 12px 16px 14px; }
.header-title { font-size: 13px; opacity: .7; text-transform: uppercase; letter-spacing: .05em; }
.header-name { font-size: 22px; font-weight: 700; margin-top: 2px; line-height: 1.2; }
.header-div { font-size: 12px; opacity: .65; margin-top: 3px; }
.header-row { display: flex; align-items: flex-start; justify-content: space-between; }
.pick-btn { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3); color: white; border-radius: 20px; padding: 5px 13px; font-size: 13px; cursor: pointer; white-space: nowrap; margin-top: 4px; }
.pick-btn:active { background: rgba(255,255,255,.28); }

/* TABS */
.tabs { background: white; display: flex; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tab { flex: 1; text-align: center; padding: 11px 4px; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s; }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tab:active { background: var(--gray-light); }

/* CONTENT */
.content { padding: 0 0 80px; }
.section { display: none; }
.section.active { display: block; }

/* GAME CARDS */
.date-group { }
.date-header { background: var(--gray-light); padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .05em; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.game-card { background: white; border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.game-card.upcoming { }
.game-card.fav-game { border-left: 4px solid var(--blue); padding-left: 12px; }

.game-time-col { text-align: center; min-width: 54px; }
.game-time { font-size: 14px; font-weight: 600; color: var(--blue); }
.game-loc { font-size: 10px; color: var(--text-2); margin-top: 2px; line-height: 1.3; }
.game-loc-abbr { font-weight: 500; }

.game-teams { flex: 1; min-width: 0; }
.team-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; }
.team-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
.team-name.fav { color: var(--blue); font-weight: 700; }
.team-name.winner { font-weight: 700; }
.team-score { font-size: 18px; font-weight: 700; min-width: 28px; text-align: right; }
.team-score.winner { color: var(--green); }
.team-score.loser { color: var(--red); }
.vs-dot { font-size: 11px; color: var(--border); font-weight: 700; padding: 2px 0; text-align: center; }
.game-badge { }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; }
.badge-win { background: var(--green-light); color: var(--green); }
.badge-loss { background: var(--red-light); color: var(--red); }
.badge-tie { background: var(--gold-light); color: var(--gold); }
.badge-up { background: var(--blue-light); color: var(--blue); }
.round-label { font-size: 11px; color: var(--text-2); margin-top: 4px; }

/* STANDINGS */
.standings-card { background: white; margin: 12px; border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.standings-header { background: var(--blue); color: white; padding: 10px 14px; font-size: 14px; font-weight: 600; }
.standings-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.standings-table th { text-align: left; padding: 8px 14px; font-size: 11px; font-weight: 600; color: var(--gray); background: var(--gray-light); border-bottom: 1px solid var(--border); text-transform: uppercase; }
.standings-table th:not(:first-child) { text-align: center; }
.standings-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.standings-table td:not(:first-child) { text-align: center; }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr.my-team td { background: var(--blue-light); font-weight: 600; }
.standings-table tr.my-team td:first-child { color: var(--blue); }
.rank-num { color: var(--text-2); font-weight: 400; margin-right: 6px; }
.pts-col { font-weight: 700; color: var(--blue); }

/* TEAM PICKER */
.picker-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; }
.picker-overlay.open { display: flex; align-items: flex-end; }
.picker-sheet { background: white; width: 100%; max-height: 90vh; border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column; }
.picker-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
.picker-title { padding: 14px 16px 10px; font-size: 17px; font-weight: 700; border-bottom: 1px solid var(--border); }
.picker-search { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.picker-search input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; font-size: 16px; outline: none; background: var(--gray-light); }
.picker-search input:focus { border-color: var(--blue); background: white; }
.picker-list { overflow-y: auto; flex: 1; }
.picker-div-header { padding: 7px 16px; font-size: 11px; font-weight: 700; color: var(--gray); background: var(--gray-light); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.picker-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.picker-item:active { background: var(--blue-light); }
.picker-item.selected { background: var(--blue-light); }
.picker-item-name { font-size: 16px; font-weight: 500; }
.picker-item.selected .picker-item-name { color: var(--blue); font-weight: 700; }
.star-icon { font-size: 18px; }

/* EMPTY STATES */
.empty { text-align: center; padding: 48px 24px; color: var(--text-2); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-msg { font-size: 16px; font-weight: 500; }
.empty-sub { font-size: 14px; margin-top: 6px; }

/* REFRESH BAR */
.refresh-bar { background: var(--gold-light); border-bottom: 1px solid #fcd34d; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--gold); }
.refresh-btn { background: var(--gold); color: white; border: none; border-radius: 8px; padding: 4px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

.no-team-prompt { text-align: center; padding: 60px 24px; }
.no-team-prompt .big { font-size: 56px; margin-bottom: 16px; }
.no-team-prompt h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.no-team-prompt p { color: var(--gray); font-size: 15px; margin-bottom: 24px; }
.cta-btn { background: var(--blue); color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 600; cursor: pointer; }

/* AGE-GROUP / DIVISION CHIPS */
.age-chip { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 8px; color: white; letter-spacing: .02em; white-space: nowrap; }
.age-chip.age-12U { background: #0891b2; }
.age-chip.age-14U { background: #16a34a; }
.age-chip.age-16U { background: #7c3aed; }
.age-chip.age-18U { background: #c2410c; }
.div-chip { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 8px; background: var(--gray-light); color: var(--text-2); margin-left: 4px; }
.header-chips { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.tourney-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.25); color: rgba(255,255,255,.85); border-radius: 20px; padding: 4px 11px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.tourney-btn:active { background: rgba(255,255,255,.2); }

/* FUTURE SCENARIOS */
.scenario-card { background: white; margin: 12px; border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.scenario-header { background: var(--blue); color: white; padding: 10px 14px; font-size: 14px; font-weight: 600; }
.scenario-body { padding: 10px 14px 14px; }
.scenario-node { border-left: 3px solid var(--border); padding-left: 12px; margin-top: 10px; }
.scenario-node.root { border-left: none; padding-left: 0; margin-top: 0; }
.scenario-game-line { font-size: 14px; font-weight: 600; color: var(--text); }
.scenario-game-line .vs-opp { color: var(--blue); }
.scenario-game-line .vs-opp.locked { color: var(--text); }
.scenario-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.scenario-branches { display: flex; gap: 10px; margin-top: 8px; }
.scenario-branch { flex: 1; min-width: 0; }
.scenario-branch-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 0; }
.scenario-branch-label.win { color: var(--green); }
.scenario-branch-label.lose { color: var(--red); }
.scenario-leaf { font-size: 13px; font-weight: 700; padding: 6px 10px; border-radius: 8px; margin-top: 4px; }
.scenario-leaf.win { background: var(--green-light); color: var(--green); }
.scenario-leaf.lose { background: var(--red-light); color: var(--red); }
.scenario-leaf.continue { background: var(--blue-light); color: var(--blue); }
.scenario-range-summary { display: flex; gap: 0; border-top: 1px solid var(--border); margin-top: 4px; }
.scenario-range-summary .rs-item { flex: 1; text-align: center; padding: 10px 0; }
.scenario-range-summary .rs-item:first-child { border-right: 1px solid var(--border); }
.scenario-range-summary .rs-num { font-size: 22px; font-weight: 800; color: var(--blue); }
.scenario-range-summary .rs-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: .04em; }

/* PLACEMENT TRACKER */
.tracker-card { background: white; margin: 12px; border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.tracker-header { background: var(--blue); color: white; padding: 10px 14px; font-size: 14px; font-weight: 600; }
.tracker-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.tracker-row:last-child { border-bottom: none; }
.tracker-row.my-team { background: var(--blue-light); }
.tracker-name { flex: 1; min-width: 0; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tracker-record { font-size: 12px; color: var(--text-2); min-width: 44px; text-align: center; }
.tracker-range { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 10px; white-space: nowrap; min-width: 90px; text-align: center; }
.tracker-range.tier-gold { background: var(--gold-light); color: var(--gold); }
.tracker-range.tier-mid { background: var(--blue-light); color: var(--blue); }
.tracker-range.tier-low { background: var(--gray-light); color: var(--gray); }
.group-strength { font-size: 11px; color: var(--gray); font-weight: 400; text-transform: none; letter-spacing: 0; }
</style>
</head>
<body>
<div class="safe-top"></div>

<!-- HEADER -->
<div class="header" id="mainHeader">
  <div class="header-row">
    <div>
      <div class="header-title" id="tourneyLabel">2026 Futures Superfinals</div>
      <div class="header-name" id="favTeamName">Pick Your Team ⭐</div>
      <div class="header-chips" id="favTeamChips"></div>
    </div>
    <div class="header-actions">
      <button class="tourney-btn" onclick="openTourneyPicker()" id="tourneyBtn">Change Tournament</button>
      <button class="pick-btn" onclick="openPicker()">Change Team</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('myTeam')" id="tab-myTeam">My Team</div>
  <div class="tab" onclick="showTab('standings')" id="tab-standings">Standings</div>
  <div class="tab" onclick="showTab('schedule')" id="tab-schedule">Full Schedule</div>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- MY TEAM -->
  <div class="section active" id="sec-myTeam">
    <div id="myTeamContent"></div>
  </div>

  <!-- STANDINGS -->
  <div class="section" id="sec-standings">
    <div id="standingsContent"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="section" id="sec-schedule">
    <div id="scheduleContent"></div>
  </div>
</div>

<!-- TEAM PICKER -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePicker(event)">
  <div class="picker-sheet" id="pickerSheet">
    <div class="picker-handle"></div>
    <div class="picker-title">Choose Your Team ⭐</div>
    <div class="picker-search">
      <input type="text" id="searchInput" placeholder="Search teams..." oninput="filterTeams()" autocomplete="off" autocorrect="off" autocapitalize="off">
    </div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<!-- TOURNAMENT PICKER -->
<div class="picker-overlay" id="tourneyPickerOverlay" onclick="closeTourneyPicker(event)">
  <div class="picker-sheet" id="tourneyPickerSheet">
    <div class="picker-handle"></div>
    <div class="picker-title">Choose Tournament</div>
    <div class="picker-list" id="tourneyPickerList"></div>
  </div>
</div>

<script src="src/resolver.js"></script>
<script src="data/manifest.js"></script>
<script src="data/2026-girls-futures-superfinals.js"></script>
<script>
// --- Tournament selection ---
const MANIFEST = window.TOURNAMENT_MANIFEST || [];
function pickDefaultTournamentId() {
  const saved = localStorage.getItem('activeTournamentId');
  if (saved && window.TOURNAMENTS[saved] && MANIFEST.some((t) => t.id === saved)) return saved;
  const current = MANIFEST.find((t) => t.status === 'current');
  return current ? current.id : (MANIFEST[0] && MANIFEST[0].id);
}
let activeTournamentId = pickDefaultTournamentId();
let TD = window.TOURNAMENTS[activeTournamentId];
let resolvedCache = {};
function getResolved(division) {
  if (!resolvedCache[division]) {
    resolvedCache[division] = Resolver.resolveDivision(TD.games.filter((g) => g.division === division));
  }
  return resolvedCache[division];
}

// --- State ---
let favTeam = localStorage.getItem('favTeam') || null;
let favDiv  = localStorage.getItem('favDiv')  || null;
let activeTab = 'myTeam';

if (favTeam && !TD.teams.some((t) => t.name === favTeam && t.division === favDiv)) {
  favTeam = null;
  favDiv = null;
}

// --- Init ---
renderHeader();
renderMyTeam();
renderSchedule();

// --- Tab switching ---
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('sec-' + tab).classList.add('active');
  if (tab === 'standings') renderStandings();
}

// --- Escaping helpers (data is sheet-sourced, but cheap insurance against odd characters) ---
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}

// --- Age/division chips ---
function ageOf(division) {
  const m = /^(\d+U)/.exec(division || '');
  return m ? m[1] : '';
}
function divNum(division) {
  const m = /D(\d)$/.exec(division || '');
  return m ? 'D' + m[1] : '';
}
function ageChipHTML(division) {
  const age = ageOf(division);
  if (!age) return '';
  return `<span class="age-chip age-${age}">${age}</span><span class="div-chip">${divNum(division)}</span>`;
}

// --- Header ---
function renderHeader() {
  document.getElementById('tourneyLabel').textContent = TD.tournament;
  if (favTeam) {
    document.getElementById('favTeamName').textContent = favTeam;
    document.getElementById('favTeamChips').innerHTML = ageChipHTML(favDiv);
  } else {
    document.getElementById('favTeamName').textContent = 'Pick Your Team ⭐';
    document.getElementById('favTeamChips').innerHTML = '';
  }
}

function divLabel(div) {
  if (!div) return '';
  return div.replace(/_/g, ' ').replace('GIRLS', 'Girls').replace('BOYS', 'Boys');
}

// --- My Team ---
function renderMyTeam() {
  const el = document.getElementById('myTeamContent');
  if (!favTeam) {
    el.innerHTML = `<div class="no-team-prompt">
      <div class="big">🏊</div>
      <h2>Choose Your Team</h2>
      <p>Tap below to pick your team and see all their games, results, and standings.</p>
      <button class="cta-btn" onclick="openPicker()">Pick My Team ⭐</button>
    </div>`;
    return;
  }

  const resolved = getResolved(favDiv);
  const games = resolved.games.filter(g =>
    g.whiteTeam === favTeam || g.darkTeam === favTeam ||
    (g.white || '').toUpperCase() === favTeam.toUpperCase() ||
    (g.dark || '').toUpperCase() === favTeam.toUpperCase()
  );

  if (!games.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">No games found for ${escapeHtml(favTeam)}</div></div>`;
    return;
  }

  games.sort((a, b) => gameTS(a).localeCompare(gameTS(b)));

  const played = games.filter(g => g.played);
  let wins = 0, losses = 0, ties = 0;
  played.forEach(g => {
    const iAmWhite = (g.whiteTeam || g.white).toUpperCase() === favTeam.toUpperCase();
    const myScore = iAmWhite ? g.white_score : g.dark_score;
    const oppScore = iAmWhite ? g.dark_score : g.white_score;
    if (myScore > oppScore) wins++;
    else if (myScore < oppScore) losses++;
    else ties++;
  });

  const upcoming = games.filter(g => !g.played);
  const next = upcoming[0];

  let html = '';

  // Record summary
  html += `<div style="background:white;padding:14px 16px;border-bottom:1px solid #e5e7eb;display:flex;gap:0">`;
  html += `<div style="flex:1;text-align:center;border-right:1px solid #e5e7eb"><div style="font-size:28px;font-weight:800;color:#15803d">${wins}</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Wins</div></div>`;
  html += `<div style="flex:1;text-align:center;border-right:1px solid #e5e7eb"><div style="font-size:28px;font-weight:800;color:#b91c1c">${losses}</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Losses</div></div>`;
  if (ties) html += `<div style="flex:1;text-align:center;border-right:1px solid #e5e7eb"><div style="font-size:28px;font-weight:800;color:#d97706">${ties}</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Ties</div></div>`;
  html += `<div style="flex:1;text-align:center"><div style="font-size:28px;font-weight:800;color:#1a56a8">${upcoming.length}</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Coming</div></div>`;
  html += `</div>`;

  // Next game highlight
  if (next) {
    const iAmWhite = (next.whiteTeam || next.white).toUpperCase() === favTeam.toUpperCase();
    const oppLabel = iAmWhite ? next.darkLabel : next.whiteLabel;
    html += `<div style="background:#e8f0fb;padding:12px 16px;border-bottom:1px solid #c7d8f5">
      <div style="font-size:11px;color:#1a56a8;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">⏰ Next Game &bull; ${escapeHtml(next.round || '')}</div>
      <div style="font-size:16px;font-weight:700;color:#111827">vs ${escapeHtml(oppLabel || '—')}</div>
      <div style="font-size:13px;color:#1a56a8;margin-top:3px">${formatDate(next.date)} &bull; ${next.time} &bull; ${abbrevLocation(next.location)}</div>
    </div>`;
  }

  // Future scenarios
  html += scenarioCardHTML(resolved, favTeam);

  // Games grouped by date
  const byDate = {};
  games.forEach(g => {
    if (!byDate[g.date]) byDate[g.date] = [];
    byDate[g.date].push(g);
  });

  for (const [date, dGames] of Object.entries(byDate)) {
    html += `<div class="date-header">${formatDate(date)}</div>`;
    dGames.forEach(g => { html += gameCardHTML(g, favTeam); });
  }

  el.innerHTML = html;
}

// --- Future scenarios ("Path to the Finish") ---
function ordWord(n) {
  if (n == null) return '?';
  const rem100 = n % 100;
  if (rem100 >= 11 && rem100 <= 13) return n + 'th';
  const suffix = { 1: 'st', 2: 'nd', 3: 'rd' }[n % 10] || 'th';
  return n + suffix;
}

function scenarioCardHTML(resolved, team) {
  const scenario = Resolver.buildScenarios(resolved.ctx, team);
  if (!scenario) return '';
  let html = `<div class="scenario-card">
    <div class="scenario-header">🔮 Path to the Finish</div>
    <div class="scenario-body">`;
  if (scenario.floor != null && scenario.ceiling != null) {
    html += `<div class="scenario-range-summary">
      <div class="rs-item"><div class="rs-num">${ordWord(scenario.ceiling)}</div><div class="rs-label">Best Case</div></div>
      <div class="rs-item"><div class="rs-num">${ordWord(scenario.floor)}</div><div class="rs-label">Worst Case</div></div>
    </div>`;
  }
  html += scenarioNodeHTML(scenario.tree);
  html += `</div></div>`;
  return html;
}

function scenarioNodeHTML(node) {
  if (!node || !node.gameId) return '';
  let html = `<div class="scenario-node root">
    <div class="scenario-game-line">vs <span class="vs-opp ${node.opponentLocked ? 'locked' : ''}">${escapeHtml(node.opponent)}</span></div>
    <div class="scenario-meta">${formatDate(node.date)} &bull; ${node.time} &bull; ${escapeHtml(node.round || '')}</div>`;
  if (node.rrRange) {
    html += `<div class="scenario-meta">This is a round-robin among ${node.rrRange[1] - node.rrRange[0] + 1} teams for places ${ordWord(node.rrRange[0])}–${ordWord(node.rrRange[1])} — final spot depends on every result in the group, not just this game.</div>`;
  } else if (!node.final && (node.onWin || node.onLose)) {
    html += `<div class="scenario-branches">
      <div class="scenario-branch"><div class="scenario-branch-label win">If they win</div>${scenarioBranchHTML(node.onWin)}</div>
      <div class="scenario-branch"><div class="scenario-branch-label lose">If they lose</div>${scenarioBranchHTML(node.onLose)}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function scenarioBranchHTML(node) {
  if (!node) return `<div class="scenario-leaf">TBD</div>`;
  if (node.terminal) {
    if (node.place != null) return `<div class="scenario-leaf ${node.place <= 8 ? 'win' : 'lose'}">Finish ${ordWord(node.place)}</div>`;
    return `<div class="scenario-leaf">TBD</div>`;
  }
  const when = [formatDate(node.date), node.time, abbrevLocation(node.location)].filter(Boolean).join(' &bull; ');
  return `<div class="scenario-leaf continue">vs ${escapeHtml(node.opponent)}<br><span style="font-weight:400">${escapeHtml(node.round || '')}</span>${when ? `<br><span style="font-weight:400;font-size:11px">${when}</span>` : ''}</div>`;
}

// --- Standings: per-group tables + division-wide Placement Tracker ---
function renderStandings() {
  const el = document.getElementById('standingsContent');
  if (!favTeam) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-msg">Pick a team to see standings</div></div>`;
    return;
  }

  const resolved = getResolved(favDiv);
  let html = '';

  Object.keys(resolved.standings).sort().forEach((let_) => {
    html += groupTableHTML(let_, resolved.standings[let_]);
  });

  html += placementTrackerHTML(resolved);

  el.innerHTML = html || `<div class="empty"><div class="empty-icon">⏳</div><div class="empty-msg">No results yet in this division</div></div>`;
}

function groupTableHTML(let_, g) {
  let html = `<div class="standings-card">
    <div class="standings-header">Group ${escapeHtml(let_)}${g.complete ? '' : ' <span class="group-strength">(in progress)</span>'}</div>
    <table class="standings-table">
      <thead><tr><th style="width:44%">Team</th><th>W</th><th>L</th><th>T</th><th>GD</th></tr></thead><tbody>`;
  g.ranked.forEach((r, i) => {
    const isFav = r.name.toUpperCase() === (favTeam || '').toUpperCase();
    const gd = r.gf - r.ga;
    const gdStr = gd > 0 ? '+' + gd : gd;
    html += `<tr class="${isFav ? 'my-team' : ''}">
      <td><span class="rank-num">${i + 1}</span>${escapeHtml(r.name)}${isFav ? ' ⭐' : ''}</td>
      <td>${r.w}</td><td>${r.l}</td><td>${r.t}</td>
      <td style="color:${gd >= 0 ? '#15803d' : '#b91c1c'}">${gdStr}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function finalPlacementFor(resolved, teamName) {
  let place = null;
  resolved.games.forEach((g) => {
    if (g.status !== 'final') return;
    const m = /^(\d+)(st|nd|rd|th)$/i.exec((g.round || '').trim());
    if (!m) return;
    const n = parseInt(m[1], 10);
    const winnerIsWhite = parseFloat(g.white_score) > parseFloat(g.dark_score);
    const winner = winnerIsWhite ? g.whiteTeam : g.darkTeam;
    const loser = winnerIsWhite ? g.darkTeam : g.whiteTeam;
    if (winner === teamName) place = n;
    else if (loser === teamName) place = n + 1;
  });
  return place;
}

// A team's overall record so far this event -- computed directly from their own final
// games rather than from any single group's standings table. A team that has moved from
// a pool group into a placement-bracket round robin (e.g. Group F -> Group M) shows up in
// *two* group-standings tables under the same name; picking "whichever group matched last"
// silently clobbered a real record with a placement bracket's not-yet-started 0-0.
function recordFor(resolved, teamName) {
  const record = { w: 0, l: 0, t: 0, gf: 0, ga: 0 };
  let any = false;
  resolved.games.forEach((g) => {
    if (g.status !== 'final') return;
    const iAmWhite = g.whiteTeam === teamName;
    const iAmDark = g.darkTeam === teamName;
    if (!iAmWhite && !iAmDark) return;
    any = true;
    const myScore = iAmWhite ? g.white_score : g.dark_score;
    const oppScore = iAmWhite ? g.dark_score : g.white_score;
    record.gf += myScore; record.ga += oppScore;
    if (myScore > oppScore) record.w++;
    else if (myScore < oppScore) record.l++;
    else record.t++;
  });
  return any ? record : null;
}

function placementTrackerHTML(resolved) {
  const divTeams = (TD.teams || []).filter((t) => t.division === favDiv);
  if (!divTeams.length) return '';

  const rows = divTeams.map((t) => {
    const record = recordFor(resolved, t.name);
    const scenario = Resolver.buildScenarios(resolved.ctx, t.name);
    let floor = scenario ? scenario.floor : null;
    let ceiling = scenario ? scenario.ceiling : null;
    if (floor == null || ceiling == null) {
      const locked = finalPlacementFor(resolved, t.name);
      if (locked != null) { floor = locked; ceiling = locked; }
    }
    return { name: t.name, record, floor, ceiling };
  });

  rows.sort((a, b) => {
    const ac = a.ceiling == null ? 999 : a.ceiling, bc = b.ceiling == null ? 999 : b.ceiling;
    if (ac !== bc) return ac - bc;
    const aw = a.record ? a.record.w : 0, bw = b.record ? b.record.w : 0;
    return bw - aw;
  });

  let html = `<div class="tracker-card">
    <div class="tracker-header">${escapeHtml(divLabel(favDiv))} — Placement Tracker</div>`;
  rows.forEach((r) => {
    const isFav = r.name.toUpperCase() === (favTeam || '').toUpperCase();
    const recordStr = r.record ? `${r.record.w}-${r.record.l}${r.record.t ? '-' + r.record.t : ''}` : '—';
    let rangeStr, tier;
    if (r.floor != null && r.ceiling != null) {
      rangeStr = r.floor === r.ceiling ? `Locked: ${ordWord(r.floor)}` : `${ordWord(r.ceiling)}–${ordWord(r.floor)}`;
      tier = r.ceiling <= 4 ? 'tier-gold' : (r.ceiling <= 12 ? 'tier-mid' : 'tier-low');
    } else {
      rangeStr = 'TBD';
      tier = 'tier-low';
    }
    html += `<div class="tracker-row ${isFav ? 'my-team' : ''}">
      <div class="tracker-name">${escapeHtml(r.name)}${isFav ? ' ⭐' : ''}</div>
      <div class="tracker-record">${recordStr}</div>
      <div class="tracker-range ${tier}">${rangeStr}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// --- Full Schedule ---
function renderSchedule() {
  const el = document.getElementById('scheduleContent');
  const divisions = Array.from(new Set(TD.games.map(g => g.division)));
  let games = [];
  divisions.forEach((div) => { games = games.concat(getResolved(div).games); });
  games.sort((a, b) => gameTS(a).localeCompare(gameTS(b)));

  const byDate = {};
  games.forEach(g => {
    if (!byDate[g.date]) byDate[g.date] = [];
    byDate[g.date].push(g);
  });

  let html = `<div style="background:white;padding:10px 16px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#6b7280">${games.length} total games across all divisions</div>`;

  for (const [date, dGames] of Object.entries(byDate)) {
    html += `<div class="date-header">${formatDate(date)} (${dGames.length} games)</div>`;
    dGames.forEach(g => { html += gameCardHTML(g, favTeam); });
  }

  el.innerHTML = html;
}

// --- Game Card ---
function gameCardHTML(g, myTeam) {
  const inFavDiv = !favDiv || g.division === favDiv;
  const whiteTeam = g.whiteTeam || g.white;
  const darkTeam = g.darkTeam || g.dark;
  const iAmWhite = !!(myTeam && inFavDiv && whiteTeam && whiteTeam.toUpperCase() === myTeam.toUpperCase());
  const iAmDark  = !!(myTeam && inFavDiv && darkTeam && darkTeam.toUpperCase() === myTeam.toUpperCase());
  const isFavGame = iAmWhite || iAmDark;

  const ws = g.white_score;
  const ds = g.dark_score;
  const wWins = g.played && parseFloat(ws) > parseFloat(ds);
  const dWins = g.played && parseFloat(ds) > parseFloat(ws);

  let badge = '';
  if (g.played && isFavGame) {
    const myScore = iAmWhite ? ws : ds;
    const oppScore = iAmWhite ? ds : ws;
    if (parseFloat(myScore) > parseFloat(oppScore)) badge = '<span class="badge badge-win">WIN</span>';
    else if (parseFloat(myScore) < parseFloat(oppScore)) badge = '<span class="badge badge-loss">LOSS</span>';
    else badge = '<span class="badge badge-tie">TIE</span>';
  } else if (!g.played) {
    badge = ageChipHTML(g.division);
  }

  const loc = abbrevLocation(g.location);
  const whiteLabel = g.whiteLabel || g.white || '—';
  const darkLabel = g.darkLabel || g.dark || '—';

  return `<div class="game-card ${isFavGame ? 'fav-game' : ''}">
    <div class="game-time-col">
      <div class="game-time">${g.time.replace(' AM', 'a').replace(' PM', 'p')}</div>
      <div class="game-loc"><span class="game-loc-abbr">${loc}</span></div>
    </div>
    <div class="game-teams">
      <div class="team-row">
        <div class="team-name ${iAmWhite ? 'fav' : ''} ${wWins ? 'winner' : ''}">${escapeHtml(whiteLabel)}</div>
        ${g.played ? `<div class="team-score ${wWins ? 'winner' : dWins ? 'loser' : ''}">${formatScore(ws)}</div>` : ''}
      </div>
      <div class="vs-dot">vs</div>
      <div class="team-row">
        <div class="team-name ${iAmDark ? 'fav' : ''} ${dWins ? 'winner' : ''}">${escapeHtml(darkLabel)}</div>
        ${g.played ? `<div class="team-score ${dWins ? 'winner' : wWins ? 'loser' : ''}">${formatScore(ds)}</div>` : ''}
      </div>
      <div class="round-label">${badge} ${escapeHtml(g.round)}</div>
    </div>
  </div>`;
}

// --- Team Picker ---
function openPicker() {
  document.getElementById('pickerOverlay').classList.add('open');
  renderPickerList('');
  setTimeout(() => document.getElementById('searchInput').focus(), 100);
}
function closePicker(e) {
  if (e.target === document.getElementById('pickerOverlay')) {
    document.getElementById('pickerOverlay').classList.remove('open');
  }
}
function closePickerForce() {
  document.getElementById('pickerOverlay').classList.remove('open');
}
function filterTeams() {
  renderPickerList(document.getElementById('searchInput').value);
}
function renderPickerList(query) {
  const q = query.trim().toUpperCase();
  const filtered = q ? TD.teams.filter(t => t.name.includes(q) || t.division.includes(q)) : TD.teams;

  const byDiv = {};
  filtered.forEach(t => {
    if (!byDiv[t.division]) byDiv[t.division] = [];
    byDiv[t.division].push(t);
  });

  let html = '';
  Object.keys(byDiv).sort().forEach((div) => {
    html += `<div class="picker-div-header">${ageChipHTML(div)} <span style="margin-left:6px">${escapeHtml(divLabel(div))}</span></div>`;
    byDiv[div].forEach((t) => {
      const sel = favTeam === t.name && favDiv === t.division;
      html += `<div class="picker-item ${sel ? 'selected' : ''}" data-name="${escapeAttr(t.name)}" data-div="${escapeAttr(t.division)}" onclick="selectTeamFromEl(this)">
        <div class="picker-item-name">${escapeHtml(t.name)}</div>
        ${sel ? '<span class="star-icon">⭐</span>' : ''}
      </div>`;
    });
  });

  if (!html) html = `<div class="empty"><div class="empty-msg" style="margin-top:40px">No teams found</div></div>`;
  document.getElementById('pickerList').innerHTML = html;
}
function selectTeamFromEl(el) {
  selectTeam(el.dataset.name, el.dataset.div);
}
function selectTeam(name, div) {
  favTeam = name;
  favDiv  = div;
  localStorage.setItem('favTeam', name);
  localStorage.setItem('favDiv', div);
  closePickerForce();
  renderHeader();
  renderMyTeam();
  if (activeTab === 'standings') renderStandings();
}

// --- Tournament Picker ---
function openTourneyPicker() {
  renderTourneyPickerList();
  document.getElementById('tourneyPickerOverlay').classList.add('open');
}
function closeTourneyPicker(e) {
  if (!e || e.target === document.getElementById('tourneyPickerOverlay')) {
    document.getElementById('tourneyPickerOverlay').classList.remove('open');
  }
}
function renderTourneyPickerList() {
  const current = MANIFEST.filter((t) => t.status === 'current');
  const past = MANIFEST.filter((t) => t.status !== 'current');
  let html = '';
  if (current.length) {
    html += `<div class="picker-div-header">Current</div>`;
    current.forEach((t) => { html += tourneyItemHTML(t); });
  }
  if (past.length) {
    html += `<div class="picker-div-header">Past Tournaments</div>`;
    past.forEach((t) => { html += tourneyItemHTML(t); });
  }
  document.getElementById('tourneyPickerList').innerHTML = html || `<div class="empty"><div class="empty-msg" style="margin-top:40px">No tournaments found</div></div>`;
}
function tourneyItemHTML(t) {
  const sel = t.id === activeTournamentId;
  return `<div class="picker-item ${sel ? 'selected' : ''}" data-id="${escapeAttr(t.id)}" onclick="selectTournamentFromEl(this)">
    <div class="picker-item-name">${escapeHtml(t.label)}${t.status === 'current' ? ' <span class="div-chip">LIVE</span>' : ''}</div>
    ${sel ? '<span class="star-icon">⭐</span>' : ''}
  </div>`;
}
function selectTournamentFromEl(el) {
  selectTournament(el.dataset.id);
}
function selectTournament(id) {
  if (!window.TOURNAMENTS[id] || id === activeTournamentId) {
    closeTourneyPicker();
    return;
  }
  activeTournamentId = id;
  localStorage.setItem('activeTournamentId', id);
  TD = window.TOURNAMENTS[id];
  resolvedCache = {};
  if (favTeam && !TD.teams.some((t) => t.name === favTeam && t.division === favDiv)) {
    favTeam = null;
    favDiv = null;
    localStorage.removeItem('favTeam');
    localStorage.removeItem('favDiv');
  }
  closeTourneyPicker();
  renderHeader();
  renderMyTeam();
  renderSchedule();
  if (activeTab === 'standings') renderStandings();
}

// --- Helpers ---
function formatDate(d) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dt = new Date(d + 'T12:00:00');
  return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${dt.getDate()}`;
}
// Sortable timestamp: parse "8:00 AM" / "12:35 PM" into minutes so games order
// chronologically (string sort would put "10:00 AM" before "8:00 AM").
function gameTS(g) {
  const m = (g.time || '').match(/(\d+):(\d+)\s*(AM|PM)/i);
  let mins = 0;
  if (m) {
    let h = parseInt(m[1], 10) % 12;
    if (/PM/i.test(m[3])) h += 12;
    mins = h * 60 + parseInt(m[2], 10);
  }
  return (g.date || '') + ':' + String(mins).padStart(4, '0');
}
function formatScore(s) {
  if (s === null || s === undefined) return '';
  const n = parseFloat(s);
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}
function abbrevLocation(loc) {
  if (!loc) return '';
  const abbrevs = {
    'WOOLLETT FAR RIGHT': 'Woollett FR',
    'WOOLLETT LEFT': 'Woollett L',
    'WOOLLETT NEAR RIGHT': 'Woollett NR',
    'SAN CLEMENTE HS': 'San Clemente HS',
    'BECKMAN HS': 'Beckman HS',
    'JSERRA CHS': 'JSerra CHS',
    'CAPISTRANO VALLEY HS': 'Cap Valley HS',
    'SAN JUAN HILLS HS': 'SJ Hills HS',
    'EL MODENA HS': 'El Modena HS',
    'WESTMINSTER HS': 'Westminster HS',
    'LA SERNA HS': 'La Serna HS',
    'YORBA LINDA HS': 'Yorba Linda HS',
    'ESPERANZA HS': 'Esperanza HS',
    'SERVITE HS': 'Servite HS',
    'SONORA HS': 'Sonora HS',
    'CHAPMAN UNIVERSITY': 'Chapman Univ',
  };
  return abbrevs[loc] || loc;
}
