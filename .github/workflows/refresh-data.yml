# No longer the live-freshness mechanism -- that's now the Cloudflare Worker (worker/index.js,
# polling every ~1 minute server-side, see the project's hosting plan). GitHub Pages' fixed
# 10-minute CDN cache made this pipeline structurally too slow for live play regardless of
# how often it ran. This workflow's remaining job is a periodic durable snapshot: fast cold
# loads, and a permanent git history of scores over time. tools/refresh_data.py itself skips
# any tournament marked "completed" in tools/sources.json, so this no longer needs its own
# hardcoded cutoff date -- freezing is per-tournament and status-driven.
name: Refresh tournament data (periodic snapshot)

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh data
        run: python3 tools/refresh_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "tournament-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No data changes."
          else
            git add data/
            git commit -m "Auto-refresh tournament data"
            git push
          fi
