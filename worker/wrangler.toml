name = "clubwaterpolo-live"
main = "index.js"
compatibility_date = "2026-06-21"

# Attaches this Worker to clubwaterpolo.com/api/* on the same zone/domain as the Cloudflare
# Pages site -- no separate subdomain needed. Requires the zone to already be active on
# Cloudflare (nameservers delegated) before `wrangler deploy` will accept this.
routes = [
  { pattern = "clubwaterpolo.com/api/*", zone_name = "clubwaterpolo.com" },
  { pattern = "splashbracket.com/api/*", zone_name = "splashbracket.com" },
]

# Two staggered patterns instead of one -- confirmed live via `wrangler tail` that a single
# "*/3 * * * *" trigger handling every non-completed tournament in one invocation was
# exceeding the Free plan's per-invocation CPU limit on EVERY tick once this season's sheets
# grew large enough ("Exceeded CPU Limit", silently skipping the write every time -- this is
# why both tournaments stopped updating). Each tournament alone fits comfortably within
# budget (verified individually), so splitting them into separate invocations -- one per
# pattern, each firing every 6 minutes, offset by 3 -- still beats the "every 5 minutes,
# reliably" requirement while keeping each invocation's CPU cost isolated. scheduled() in
# index.js reads event.cron to know which pattern fired and only processes that pattern's
# `cron_group` (see sources.json) of tournaments. KV writes also roughly halve per
# tournament vs. the old single-pattern setup, well under the free tier's 1,000/day quota.
[triggers]
crons = ["*/6 * * * *", "3-59/6 * * * *"]

[[kv_namespaces]]
binding = "TOURNAMENT_KV"
id = "c157fb642daf4a3bafee99582667634c"

# `wrangler tail` is a LIVE-only stream -- nothing is buffered or stored, so a failure (e.g.
# the OneDrive fallback's fragile, anti-bot-sensitive flow going dark for hours) is invisible
# after the fact unless someone happened to be tailing at that exact moment. This persists
# every console.log/console.error from every invocation (including scheduled() cron ticks),
# queryable in the dashboard's Logs tab or via the API, instead of vanishing instantly.
[observability]
enabled = true

# NOTE: this account is on the Free plan, which rejects an explicit [limits] cpu_ms override
# outright ("CPU limits are not supported for the Free plan") -- confirmed by a failed deploy
# attempt, not docs. So the OneDrive fallback path (onedrive.js's unzip + XML parse, measured
# at ~90-300ms under wrangler dev/workerd) runs under whatever the Free plan's built-in default
# actually is. Verified directly against the deployed Worker (not just local wrangler dev) that
# it completes successfully -- see the commit/PR notes for that check -- but if Cloudflare ever
# tightens the default, this is the first place that would start failing.
