# Static site (replaces GitHub Pages). Deploy with: npx wrangler deploy
# (run from the repo root -- this is a separate project from worker/wrangler.toml, which
# deploys the live-data API/cron Worker under the name "clubwaterpolo-live").
name = "clubwaterpolo-site"
main = "site-worker.js"
compatibility_date = "2026-06-21"

# Cloudflare resolves overlapping Worker routes by most-specific-pattern-wins, so this
# broad wildcard coexists safely with clubwaterpolo-live's more specific
# "clubwaterpolo.com/api/*" route (worker/wrangler.toml) -- API requests keep going there,
# everything else lands here.
routes = [
  { pattern = "clubwaterpolo.com/*", zone_name = "clubwaterpolo.com" },
  { pattern = "www.clubwaterpolo.com/*", zone_name = "clubwaterpolo.com" },
  { pattern = "splashbracket.com/*", zone_name = "splashbracket.com" },
  { pattern = "www.splashbracket.com/*", zone_name = "splashbracket.com" },
]

[assets]
directory = "."
binding = "ASSETS"
# Without this, Workers Static Assets serves matching files straight from its own asset
# cache and never invokes fetch() below -- confirmed via `wrangler tail` showing zero
# invocations for clubwaterpolo.com even after deploy. The redirect logic needs to run
# first for every request; non-redirected hosts then fall through to env.ASSETS.fetch().
run_worker_first = true
